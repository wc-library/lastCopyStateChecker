<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 { color: #333; border-bottom: 2px solid #1976d2; padding-bottom: 10px; }
        .info { color: #666; margin-bottom: 20px; }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
        }
        input[type="file"] {
            margin: 10px 0;
        }
        button {
            background: #1976d2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #1565c0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 4px;
            display: none;
        }
        .results.show { display: block; }
        .loading {
            text-align: center;
            color: #666;
            display: none;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
            display: none;
        }
    </style>
</head>
<body>
    <h1>{{ .Title }}</h1>
    <p class="info">
        Checking for last copies in <strong>{{ .State }}</strong> 
        for <strong>{{ .Institution }}</strong>
    </p>
    
    <div class="form-group">
        <label for="oclc-input">Enter OCLC Numbers</label>
        <textarea id="oclc-input" rows="10" placeholder="One OCLC number per line, or comma-separated..."></textarea>
        <p>Or upload a file: <input type="file" id="oclc-file" accept=".txt,.csv"></p>
    </div>
    
    <button id="check-btn" onclick="checkNumbers()">Check Last Copies</button>
    
    <div id="loading" class="loading">
        <p>Checking WorldCat... This may take a moment.</p>
    </div>
    
    <div id="error" class="error"></div>
    
    <div id="results" class="results">
        <h2>Results</h2>
        <div id="results-content">
            <p>Implementation pending - this will show last copy candidates.</p>
        </div>
    </div>
    
    <script>
        async function checkNumbers() {
            const input = document.getElementById('oclc-input').value;
            const btn = document.getElementById('check-btn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');
            
            if (!input.trim()) {
                error.textContent = 'Please enter at least one OCLC number';
                error.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';
            results.classList.remove('show');
            
            try {
                const response = await fetch('/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'oclc-list': input })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Request failed');
                }
                
                document.getElementById('results-content').innerHTML = 
                    '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                results.classList.add('show');
            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
